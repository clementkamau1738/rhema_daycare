<form class="form-signin form-signup hide" role="form">
    <h3 class="text-center form-header">{{ _("Provide Necessary Details") }}</h3>
    <div class="page-card-body">
        <div class="form-group">
            <label class="form-label sr-only" for="signup_fullname">{{ _("Full Name") }}</label>
            <input type="text" id="signup_fullname" class="form-control" placeholder="{{ _('Jane Doe') }}" required
                autofocus autocomplete="name">
        </div>
        <div class="form-group">
            <label class="form-label sr-only" for="signup_email">{{ _("Email") }}</label>
            <input type="email" id="signup_email" class="form-control" placeholder="{{ _('jane@example.com') }}"
                required autocomplete="username">
        </div>
    </div>
    <div class="page-card-actions">
        <button class="btn btn-sm btn-primary btn-block btn-signup" type="submit" id="btn-signup-action">{{ _("Sign up")
            }}</button>

        <p class="text-center sign-up-message">
            <a href="#login" class="blue">{{ _("Have an account? Login") }}</a>
        </p>
    </div>
</form>

<style>
    .form-header {
        margin-bottom: 25px;
        font-weight: 500;
        color: #333;
        font-size: 1.5rem;
    }

    .form-control {
        border-radius: 8px;
        background-color: #f7f7f7;
        border: 1px solid #ddd;
        padding: 10px;
        height: auto;
        box-shadow: none;
    }

    .form-control:focus {
        background-color: #fff;
        border-color: #999;
        box-shadow: none;
    }

    .btn-signup {
        background-color: #000;
        border: 1px solid #000;
        color: #fff;
        border-radius: 8px;
        padding: 10px;
        font-weight: 500;
        margin-top: 15px;
        font-size: 14px;
    }

    .btn-signup:hover,
    .btn-signup:focus,
    .btn-signup:active {
        background-color: #333;
        border-color: #333;
        color: #fff;
    }
</style>
